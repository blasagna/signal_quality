[workspace]
authors = ["Bob DiMaiolo <bdimaiolo@gmail.com>"]
channels = ["conda-forge"]
name = "signal_quality"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "pytest -q"
lint = "ruff check signal_quality tests"
format = "ruff format signal_quality tests"
lab = "jupyter lab"
report-pdf = "jupyter nbconvert --to pdf --template quality_report_pdf --TemplateExporter.extra_template_basedirs=notebooks/nbconvert_templates --output-dir output notebooks/quality_report.ipynb"
report-html = "jupyter nbconvert --to html --output-dir output notebooks/quality_report.ipynb"
report = { depends-on = ["report-pdf", "report-html"] }

[pypi-dependencies]
signal_quality = { path = ".", editable = true }

[dependencies]
python = ">=3.14.6,<3.15"
numpy = ">=2.4.6,<3"
mne = ">=1.12.1,<2"
scipy = ">=1.18.0,<2"
matplotlib = ">=3.11.1,<4"
jupyterlab = ">=4.6.2,<5"
pandas = ">=3.0.3,<4"
h5py = ">=3.16.0,<4"
xarray = ">=2025.1.0"
pytest = ">=8.0,<9"
pandoc = ">=3.10,<4"
nbconvert = ">=7.17.1,<8"
ruff = ">=0.15.22,<0.16"
